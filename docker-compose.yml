services:
  feliz:
    build: .
    env_file: .env
    ports:
      - "3421:3421"   # Linear webhook + OAuth callback
    volumes:
      - ${SSH_AUTH_SOCK}:/ssh-agent:ro
      - ~/.ssh/known_hosts:/home/feliz/.ssh/known_hosts:ro
      - feliz-data:/data/feliz
      - feliz-config:/home/feliz/.feliz
      - feliz-agent-local:/home/feliz/.local
      - feliz-npm-global:/home/feliz/.npm-global
      - feliz-claude-config:/home/feliz/.claude
      - feliz-codex-config:/home/feliz/.codex
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - LINEAR_OAUTH_TOKEN
      - GITHUB_TOKEN
      - GH_TOKEN=${GITHUB_TOKEN}
      - GIT_AUTHOR_NAME
      - GIT_AUTHOR_EMAIL
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    restart: unless-stopped

volumes:
  feliz-data:
  feliz-config:
  feliz-agent-local:
  feliz-npm-global:
  feliz-claude-config:
  feliz-codex-config:
